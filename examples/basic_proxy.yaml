# basic_proxy.yaml
#
# Minimal transparent proxy: forwards all traffic from a single stdio upstream
# to the MCP client with no filtering.  Useful as a starting point.
#
# Usage (stdio, e.g. Claude Desktop):
#   mcp-proxy --config basic_proxy.yaml

proxy:
  name: basic-proxy
  transport: streamable-http

global_plugins:
  - type: logging
    log_file: logs/audit.jsonl
    include_payloads: true
  - type: inventory
    inventory_file: logs/inventory.json

upstreams:
  - name: tools
    transport:
      type: stdio
      command: uvx
      args: ["mcp-server-fetch"]
